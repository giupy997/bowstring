[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.26"
optimizer = true
optimizer_runs = 1_000_000
evm_version = "cancun"
via_ir = true
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@uniswap/v4-core/=lib/v4-core/",
    "forge-std/=lib/forge-std/src/",
]

[rpc_endpoints]
robinhood = "${ROBINHOOD_RPC}"

# Source verification on Robinhood Chain goes through Blockscout, which
# needs no API key: pass --verifier blockscout --verifier-url
# 'https://robinhoodchain.blockscout.com/api/' on the forge command line.
