[build]
  base = "web"
  command = "npm run build"
  # Git-based Netlify builds resolve `publish` relative to `base` — keep
  # ".next" here. (The CLI resolves it from the repo root instead; for a
  # one-off CLI deploy use: netlify deploy --build --prod --dir web/.next)
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
